<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Support Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwindcss.config = {
        darkMode: "class",
      };
    </script>
    <style>
      * {
        scrollbar-width: thin;
      }
      .msg-enter {
        animation: msg-in 0.25s ease-out;
      }
      @keyframes msg-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .typing-dot {
        animation: blink 1.4s infinite both;
      }
      .typing-dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-dot:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes blink {
        0%, 80%, 100% {
          opacity: 0;
        }
        40% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body class="min-h-screen bg-zinc-100 text-zinc-900 transition-colors dark:bg-zinc-900 dark:text-zinc-100">
    <main class="mx-auto flex min-h-screen w-full max-w-3xl flex-col px-3 py-4 sm:px-4 sm:py-6">
      <header class="mb-4 flex items-center justify-between gap-3">
        <div class="flex items-center gap-3">
          <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-emerald-600 text-sm font-bold text-white shadow-sm">
            S
          </div>
          <div>
            <h1 class="text-base font-semibold tracking-tight sm:text-lg">Support Agent</h1>
            <p id="sessionLabel" class="text-[11px] text-zinc-400 dark:text-zinc-500"></p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button id="themeToggle" type="button" class="rounded-lg border border-zinc-300 bg-white p-2 text-sm text-zinc-600 shadow-sm hover:bg-zinc-50 focus:outline-none focus:ring-2 focus:ring-emerald-500 dark:border-zinc-700 dark:bg-zinc-800 dark:text-zinc-400 dark:hover:bg-zinc-700" title="Toggle theme">
            <svg id="themeIconLight" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/></svg>
            <svg id="themeIconDark" xmlns="http://www.w3.org/2000/svg" class="hidden h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
          </button>
          <button id="resetSession" type="button" class="rounded-lg border border-zinc-300 bg-white px-3 py-2 text-xs font-medium text-zinc-600 shadow-sm hover:bg-zinc-50 focus:outline-none focus:ring-2 focus:ring-emerald-500 dark:border-zinc-700 dark:bg-zinc-800 dark:text-zinc-400 dark:hover:bg-zinc-700 sm:text-sm">
            Reset
          </button>
        </div>
      </header>

      <section id="chatHistory" class="flex min-h-0 flex-1 flex-col gap-3 overflow-y-auto rounded-xl border border-zinc-200 bg-white p-4 shadow-sm dark:border-zinc-700 dark:bg-zinc-800/60 sm:p-5" aria-live="polite">
        <div class="mt-auto"></div>
      </section>

      <form id="chatForm" class="mt-3 flex gap-2 sm:mt-4">
        <input id="messageInput" name="message" type="text" autocomplete="off" class="min-w-0 flex-1 rounded-xl border border-zinc-300 bg-white px-4 py-3 text-sm shadow-sm transition-colors placeholder:text-zinc-400 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/40 dark:border-zinc-700 dark:bg-zinc-800 dark:text-zinc-100 dark:placeholder:text-zinc-500" placeholder="Tulis pesan..." required />
        <button id="sendButton" type="submit" class="flex items-center gap-2 rounded-xl bg-emerald-600 px-5 py-3 text-sm font-semibold text-white shadow-sm transition-all hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 disabled:cursor-not-allowed disabled:bg-zinc-400 dark:disabled:bg-zinc-600">
          <span id="sendLabel">Kirim</span>
          <svg id="sendIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>
        </button>
      </form>
    </main>

    <script>
      const SESSION_KEY = "support-agent-session-id";
      const chatHistory = document.querySelector("#chatHistory");
      const chatForm = document.querySelector("#chatForm");
      const messageInput = document.querySelector("#messageInput");
      const sendButton = document.querySelector("#sendButton");
      const sendLabel = document.querySelector("#sendLabel");
      const sessionLabel = document.querySelector("#sessionLabel");
      const resetBtn = document.querySelector("#resetSession");
      const themeToggle = document.querySelector("#themeToggle");
      const themeIconLight = document.querySelector("#themeIconLight");
      const themeIconDark = document.querySelector("#themeIconDark");

      let typingIndicator = null;

      function createSessionId() {
        return crypto.randomUUID ? crypto.randomUUID() : `session-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function getSessionId() {
        let id = localStorage.getItem(SESSION_KEY);
        if (!id) { id = createSessionId(); localStorage.setItem(SESSION_KEY, id); }
        return id;
      }

      function updateSessionLabel() {
        sessionLabel.textContent = `Session: ${getSessionId().slice(0, 8)}...`;
      }

      function scrollToBottom() {
        chatHistory.scrollTop = chatHistory.scrollHeight;
      }

      function timeStr() {
        return new Date().toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
      }

      function renderMessage(role, text, tools = []) {
        const align = role === "user" ? "justify-end" : "justify-start";
        const row = document.createElement("div");
        row.className = `flex ${align} msg-enter`;

        const colors = role === "user"
          ? "bg-emerald-600 text-white rounded-2xl rounded-br-md"
          : "border border-zinc-200 bg-zinc-50 text-zinc-900 dark:border-zinc-600 dark:bg-zinc-700/60 dark:text-zinc-100 rounded-2xl rounded-bl-md";

        const bubble = document.createElement("div");
        bubble.className = `max-w-[88%] sm:max-w-[78%] ${colors} px-4 py-3 text-sm leading-6 shadow-sm`;

        const content = document.createElement("p");
        content.className = "whitespace-pre-wrap";
        content.textContent = text;
        bubble.appendChild(content);

        if (tools.length > 0) {
          const badges = document.createElement("div");
          badges.className = "mt-2 flex flex-wrap gap-1.5";
          const toolColors = {
            search_knowledge_base: "border-sky-300 bg-sky-50 text-sky-700 dark:bg-sky-900/40 dark:text-sky-300 dark:border-sky-700",
            check_order_status: "border-violet-300 bg-violet-50 text-violet-700 dark:bg-violet-900/40 dark:text-violet-300 dark:border-violet-700",
            create_ticket: "border-amber-300 bg-amber-50 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300 dark:border-amber-700",
            escalate_to_human: "border-rose-300 bg-rose-50 text-rose-700 dark:bg-rose-900/40 dark:text-rose-300 dark:border-rose-700",
          };
          tools.forEach((tool) => {
            const badge = document.createElement("span");
            const c = toolColors[tool] || "border-zinc-300 bg-zinc-50 text-zinc-600 dark:border-zinc-600 dark:bg-zinc-700 dark:text-zinc-300";
            badge.className = `rounded-md border px-2 py-0.5 text-[11px] font-medium ${c}`;
            badge.textContent = tool;
            badges.appendChild(badge);
          });
          bubble.appendChild(badges);
        }

        const time = document.createElement("p");
        time.className = "mt-1 text-[10px] opacity-50";
        time.textContent = timeStr();
        bubble.appendChild(time);

        row.appendChild(bubble);
        chatHistory.appendChild(row);
        scrollToBottom();
      }

      function showTyping() {
        if (typingIndicator) return;
        const row = document.createElement("div");
        row.className = "flex justify-start msg-enter";
        row.id = "typing-indicator";

        const bubble = document.createElement("div");
        bubble.className = "flex items-center gap-1.5 rounded-2xl rounded-bl-md border border-zinc-200 bg-zinc-50 px-4 py-3 dark:border-zinc-600 dark:bg-zinc-700/60";

        for (let i = 0; i < 3; i++) {
          const dot = document.createElement("span");
          dot.className = "typing-dot inline-block h-2 w-2 rounded-full bg-zinc-400 dark:bg-zinc-500";
          bubble.appendChild(dot);
        }

        row.appendChild(bubble);
        chatHistory.appendChild(row);
        scrollToBottom();
        typingIndicator = row;
      }

      function hideTyping() {
        if (typingIndicator) {
          typingIndicator.remove();
          typingIndicator = null;
        }
      }

      function setLoading(isLoading) {
        sendButton.disabled = isLoading;
        messageInput.disabled = isLoading;
        sendLabel.textContent = isLoading ? "..." : "Kirim";
        if (isLoading) {
          showTyping();
        } else {
          hideTyping();
        }
      }

      chatForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = messageInput.value.trim();
        if (!message) return;

        renderMessage("user", message);
        messageInput.value = "";
        setLoading(true);

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: getSessionId(), message }),
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          renderMessage("agent", data.response, data.tools_used || []);
        } catch {
          renderMessage("agent", "Maaf, request gagal diproses. Coba lagi sebentar.");
        } finally {
          setLoading(false);
          messageInput.focus();
        }
      });

      messageInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) chatForm.dispatchEvent(new Event("submit"));
      });

      resetBtn.addEventListener("click", () => {
        localStorage.setItem(SESSION_KEY, createSessionId());
        chatHistory.querySelectorAll(":scope > div").forEach((el) => el.remove());
        updateSessionLabel();
        messageInput.focus();
      });

      function applyTheme(dark) {
        document.documentElement.classList.toggle("dark", dark);
        localStorage.setItem("theme", dark ? "dark" : "light");
        themeIconLight.classList.toggle("hidden", dark);
        themeIconDark.classList.toggle("hidden", !dark);
      }

      themeToggle.addEventListener("click", () => {
        applyTheme(!document.documentElement.classList.contains("dark"));
      });

      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "dark" || (!savedTheme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        applyTheme(true);
      }

      updateSessionLabel();
      renderMessage("agent", "Halo! Ada yang bisa saya bantu?");
    </script>
  </body>
</html>
