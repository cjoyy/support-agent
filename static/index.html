<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Support Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-zinc-100 text-zinc-950">
    <main class="mx-auto flex min-h-screen w-full max-w-3xl flex-col px-4 py-6">
      <header class="mb-4 flex items-center justify-between gap-3">
        <div>
          <h1 class="text-xl font-semibold tracking-normal">Support Agent</h1>
          <p id="sessionLabel" class="mt-1 text-xs text-zinc-500"></p>
        </div>
        <button
          id="resetSession"
          type="button"
          class="rounded-md border border-zinc-300 bg-white px-3 py-2 text-sm font-medium text-zinc-700 shadow-sm hover:bg-zinc-50 focus:outline-none focus:ring-2 focus:ring-emerald-500"
        >
          Reset
        </button>
      </header>

      <section
        id="chatHistory"
        class="min-h-0 flex-1 space-y-4 overflow-y-auto rounded-lg border border-zinc-200 bg-white p-4 shadow-sm"
        aria-live="polite"
      ></section>

      <form id="chatForm" class="mt-4 flex gap-2">
        <input
          id="messageInput"
          name="message"
          type="text"
          autocomplete="off"
          class="min-w-0 flex-1 rounded-md border border-zinc-300 bg-white px-3 py-3 text-sm shadow-sm focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500"
          placeholder="Tulis pesan..."
          required
        />
        <button
          id="sendButton"
          type="submit"
          class="rounded-md bg-emerald-600 px-4 py-3 text-sm font-semibold text-white shadow-sm hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 disabled:cursor-not-allowed disabled:bg-zinc-400"
        >
          Kirim
        </button>
      </form>
    </main>

    <script>
      const SESSION_KEY = "support-agent-session-id";
      const chatHistory = document.querySelector("#chatHistory");
      const chatForm = document.querySelector("#chatForm");
      const messageInput = document.querySelector("#messageInput");
      const sendButton = document.querySelector("#sendButton");
      const sessionLabel = document.querySelector("#sessionLabel");
      const resetSession = document.querySelector("#resetSession");

      function createSessionId() {
        if (crypto.randomUUID) {
          return crypto.randomUUID();
        }
        return `session-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function getSessionId() {
        let sessionId = localStorage.getItem(SESSION_KEY);
        if (!sessionId) {
          sessionId = createSessionId();
          localStorage.setItem(SESSION_KEY, sessionId);
        }
        return sessionId;
      }

      function updateSessionLabel() {
        sessionLabel.textContent = `Session ${getSessionId().slice(0, 8)}`;
      }

      function scrollToLatest() {
        chatHistory.scrollTop = chatHistory.scrollHeight;
      }

      function renderMessage(role, text, tools = []) {
        const row = document.createElement("div");
        row.className = role === "user" ? "flex justify-end" : "flex justify-start";

        const bubble = document.createElement("div");
        bubble.className =
          role === "user"
            ? "max-w-[82%] rounded-lg bg-emerald-600 px-4 py-3 text-sm leading-6 text-white"
            : "max-w-[82%] rounded-lg border border-zinc-200 bg-zinc-50 px-4 py-3 text-sm leading-6 text-zinc-900";

        const content = document.createElement("p");
        content.className = "whitespace-pre-wrap";
        content.textContent = text;
        bubble.appendChild(content);

        if (tools.length > 0) {
          const badges = document.createElement("div");
          badges.className = "mt-3 flex flex-wrap gap-1.5";

          tools.forEach((tool) => {
            const badge = document.createElement("span");
            badge.className =
              "rounded border border-amber-300 bg-amber-50 px-2 py-0.5 text-xs font-medium text-amber-800";
            badge.textContent = tool;
            badges.appendChild(badge);
          });

          bubble.appendChild(badges);
        }

        row.appendChild(bubble);
        chatHistory.appendChild(row);
        scrollToLatest();
      }

      function setLoading(isLoading) {
        sendButton.disabled = isLoading;
        messageInput.disabled = isLoading;
        sendButton.textContent = isLoading ? "..." : "Kirim";
      }

      chatForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = messageInput.value.trim();
        if (!message) {
          return;
        }

        renderMessage("user", message);
        messageInput.value = "";
        setLoading(true);

        try {
          const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              session_id: getSessionId(),
              message,
            }),
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          renderMessage("agent", data.response, data.tools_used || []);
        } catch (error) {
          renderMessage("agent", "Maaf, request gagal diproses. Coba lagi sebentar.");
        } finally {
          setLoading(false);
          messageInput.focus();
        }
      });

      resetSession.addEventListener("click", () => {
        localStorage.setItem(SESSION_KEY, createSessionId());
        chatHistory.replaceChildren();
        updateSessionLabel();
        messageInput.focus();
      });

      updateSessionLabel();
      renderMessage("agent", "Halo, ada yang bisa saya bantu?");
    </script>
  </body>
</html>
